<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DockMind</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Dynamic freight interface</p>
          <h1>DockMind</h1>
        </div>
        <div class="status-strip" aria-label="plan status">
          <span id="status-cargo">0 cargo</span>
          <span id="status-fit">0% fill</span>
          <span id="status-risk">0 risks</span>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel input-panel" aria-label="warehouse input">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Warehouse vision</p>
              <h2>Cargo Intake</h2>
            </div>
            <button id="sample-detect-btn" class="ghost-button" type="button">Sample</button>
          </div>

          <label class="file-drop" for="image-input">
            <input id="image-input" type="file" accept="image/*">
            <span>Image or webcam frame</span>
          </label>

          <div class="vision-stage">
            <img id="warehouse-image" src="assets/sample-warehouse.svg" alt="warehouse boxes with cargo tags">
            <div id="detection-overlay" class="detection-overlay"></div>
          </div>

          <div class="annotation-toolbar" aria-label="annotation tools">
            <button id="auto-detect-btn" class="ghost-button" type="button">YOLO</button>
            <button id="draw-box-btn" class="ghost-button" type="button">Draw</button>
            <button id="use-boxes-btn" class="primary-button" type="button">Use</button>
            <button id="clear-detect-btn" class="ghost-button" type="button">Clear</button>
          </div>

          <label class="field-label" for="prompt-input">Planner Prompt</label>
          <textarea id="prompt-input" rows="4">Plan frozen food, fragile electronics, and machine parts from Osaka to Kyoto to Nagoya.</textarea>
          <button id="prompt-btn" class="primary-button" type="button">Generate Scenario</button>

          <div class="truck-picker">
            <label class="field-label" for="truck-select">Truck Model</label>
            <select id="truck-select">
              <option value="smallVan">Small van</option>
              <option value="fourTon" selected>4-ton truck</option>
              <option value="reefer">Refrigerated truck</option>
            </select>
          </div>

          <div class="manifest-block">
            <div class="panel-head compact">
              <h3>Cargo Manifest</h3>
              <button id="add-cargo-btn" class="ghost-button" type="button">Add</button>
            </div>
            <div id="manifest-list" class="manifest-list"></div>
          </div>
        </aside>

        <section class="plan-surface" aria-label="truck planning surface">
          <div class="layout-band">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Constraint plan</p>
                <h2 id="truck-title">4-ton truck</h2>
              </div>
              <div class="button-row">
                <button id="optimize-btn" class="primary-button" type="button">Optimize</button>
                <button id="export-json-btn" class="ghost-button" type="button">JSON</button>
              </div>
            </div>

            <div class="truck-layout-wrap">
              <div class="truck-ruler">
                <span>front</span>
                <span>rear door</span>
              </div>
              <div id="truck-layout" class="truck-layout" aria-label="2D truck layout"></div>
            </div>

            <div id="risk-list" class="risk-list"></div>
          </div>

          <div class="lower-grid">
            <section class="panel blender-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">Blender output</p>
                  <h2>3D Loading Plan</h2>
                </div>
                <button id="export-blender-btn" class="ghost-button" type="button">Script</button>
              </div>
              <img id="blender-preview" src="assets/blender-preview.png" alt="3D truck loading render">
              <p id="blender-note" class="muted-line">Render source: current cargo plan JSON.</p>
            </section>

            <section class="panel role-panel">
              <div class="role-tabs" id="role-tabs" aria-label="role interface tabs"></div>
              <div id="role-content" class="role-content"></div>
            </section>
          </div>
        </section>

        <aside class="panel agent-panel" aria-label="agent skills">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Company brain export</p>
              <h2>Agent Skills</h2>
            </div>
            <button id="copy-skill-btn" class="ghost-button" type="button">Copy</button>
          </div>
          <select id="skill-select" class="skill-select" aria-label="skill selector">
            <option value="loader">Loader Skill</option>
            <option value="driver">Driver Skill</option>
            <option value="ops">Ops Skill</option>
            <option value="customer">Customer Skill</option>
            <option value="agent">Agent API</option>
          </select>
          <pre id="skill-output" class="skill-output"></pre>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
